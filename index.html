<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail Dog 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111213;
    --bg2: #181a1b;
    --bg3: #212426;
    --ink: #f0ede8;
    --ink2: #b8b0a8;
    --ink3: #7a7068;
    --orange: #f97316;
    --orange-dim: #4a2a0a;
    --orange-deep: #2e1a08;
    --amber: #fbbf24;
    --amber-dim: #5c420a;
    --red: #f87171;
    --border: #2a2620;
    --border2: #221e1a;
    --card: #161412;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--ink);min-height:100vh}

  /* NOISE */
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:998;opacity:1}

  /* HEADER */
  header{padding:2rem 2rem 1.5rem;position:relative;border-bottom:1px solid var(--border);background:var(--bg2)}
  header::after{content:'🐾';position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:3.5rem;opacity:.15}
  .h-eyebrow{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:.4rem;font-weight:500}
  header h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,6vw,2.6rem);font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.5px}
  header h1 em{color:var(--orange);font-style:normal}
  .h-sub{font-size:.7rem;color:var(--ink3);margin-top:.5rem;letter-spacing:.05em}

  /* STATS BAR */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);background:var(--bg2)}
  .stat{padding:.9rem 1.2rem;border-right:1px solid var(--border);text-align:center}
  .stat:last-child{border-right:none}
  .stat-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:var(--orange);line-height:1}
  .stat-lbl{font-size:.58rem;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-top:.25rem}

  /* TABS */
  .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem}
  .tab{padding:.9rem 1.2rem;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
  .tab:hover{color:var(--orange)}
  .tab.active{color:var(--orange);border-bottom-color:var(--orange)}
  .panel{display:none}
  .panel.active{display:block}

  /* FORM */
  .fw{max-width:580px;margin:0 auto;padding:2rem 1.5rem 4rem}
  .field{margin-bottom:1.5rem}
  .field label{display:block;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:.6rem;font-weight:500}

  /* ACTIVITY TYPE PILLS */
  .activity-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
  .act-btn{padding:.85rem 1rem;border:1.5px solid var(--border);border-radius:8px;background:var(--bg3);cursor:pointer;transition:all .2s;text-align:left;font-family:'DM Mono',monospace}
  .act-btn:hover{border-color:var(--orange-dim);background:var(--orange-deep)}
  .act-btn.on{border-color:var(--orange);background:var(--orange-deep);box-shadow:0 0 0 1px var(--orange)}
  .act-icon{font-size:1.3rem;display:block;margin-bottom:.3rem}
  .act-name{font-size:.8rem;font-weight:500;color:var(--ink);display:block}
  .act-sub{font-size:.62rem;color:var(--ink3);display:block;margin-top:.1rem}

  /* LOCATION */
  .loc-list{display:flex;flex-direction:column;gap:.4rem}
  .loc-btn{padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:7px;background:var(--bg3);cursor:pointer;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--ink2);text-align:left;transition:all .15s;display:flex;align-items:center;gap:.5rem}
  .loc-btn::before{content:'📍';font-size:.85rem;opacity:.6}
  .loc-btn:hover{border-color:var(--orange-dim);color:var(--ink)}
  .loc-btn.on{border-color:var(--orange);background:var(--orange-deep);color:var(--orange);box-shadow:0 0 0 1px var(--orange)}
  .loc-btn.on::before{opacity:1}
  .add-loc-row{display:flex;gap:.5rem;margin-top:.4rem}
  .add-loc-row input{flex:1;padding:.65rem .9rem;font-family:'DM Mono',monospace;font-size:.8rem;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;color:var(--ink);outline:none;min-width:0}
  .add-loc-row input:focus{border-color:var(--orange-dim)}
  .add-loc-row input::placeholder{color:var(--ink3)}
  .add-loc-row button{padding:.65rem 1rem;background:var(--orange-dim);border:1.5px solid var(--green-dim);border-radius:7px;color:var(--orange);font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;white-space:nowrap;transition:all .15s}
  .add-loc-row button:hover{background:var(--orange);color:#fff}

  /* DISTANCE */
  .dist-wrap{position:relative}
  .dist-wrap input{width:100%;padding:.8rem 3.5rem .8rem 1rem;font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;color:var(--orange);outline:none;transition:border-color .2s}
  .dist-wrap input:focus{border-color:var(--orange-dim)}
  .dist-wrap input::placeholder{color:var(--ink3);font-size:1rem;font-weight:400}
  .dist-unit{position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:.72rem;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;pointer-events:none}

  /* DATE */
  .date-display{padding:.75rem 1rem;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--ink2);display:flex;align-items:center;gap:.5rem}

  /* SAVE BUTTON */
  .savebtn{width:100%;padding:1rem 1.5rem;background:var(--orange);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:2rem;transition:all .2s;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:.5rem}
  .savebtn:hover{background:#fb923c;transform:translateY(-2px);box-shadow:0 6px 24px rgba(249,115,22,.25)}
  .savebtn:disabled{opacity:.5;cursor:not-allowed;transform:none}

  /* LOG */
  .log-wrap{padding:1.5rem;max-width:800px;margin:0 auto}
  .log-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem}
  .log-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700}
  .log-count{font-size:.68rem;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase}

  /* FILTER BAR */
  .filter-bar{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
  .filter-btn{padding:.3rem .75rem;border:1.5px solid var(--border);border-radius:20px;background:none;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);cursor:pointer;transition:all .15s}
  .filter-btn:hover{border-color:var(--orange-dim);color:var(--ink)}
  .filter-btn.on{border-color:var(--orange);color:var(--orange);background:var(--orange-deep)}

  /* ACTIVITY CARDS */
  .act-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.3rem;margin-bottom:.75rem;display:grid;grid-template-columns:auto 1fr auto;gap:1rem;align-items:center;transition:all .2s;position:relative;overflow:hidden}
  .act-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
  .act-card.hike::before{background:#f97316}
  .act-card.trail-run::before{background:#fb923c}
  .act-card.mtb::before{background:#60a5fa}
  .act-card.ruck::before{background:#a78bfa}
  .act-card:hover{border-color:var(--border2);transform:translateX(3px)}
  .ac-icon{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
  .hike .ac-icon{background:#2e1a08}
  .trail-run .ac-icon{background:#3a1f0a}
  .mtb .ac-icon{background:#0a1f3a}
  .ruck .ac-icon{background:#1f1a3a}
  .ac-main{min-width:0}
  .ac-type{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--ink);text-transform:capitalize}
  .ac-loc{font-size:.72rem;color:var(--ink3);margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ac-date{font-size:.62rem;color:var(--ink3);margin-top:.3rem;letter-spacing:.04em}
  .ac-dist{text-align:right;flex-shrink:0}
  .ac-dist-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--orange);line-height:1}
  .ac-dist-unit{font-size:.6rem;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-top:.15rem}
  .del-btn{position:absolute;top:.7rem;right:.7rem;background:none;border:1px solid var(--border);border-radius:4px;padding:.15rem .35rem;font-size:.6rem;color:var(--ink3);cursor:pointer;transition:all .15s;opacity:0}
  .act-card:hover .del-btn{opacity:1}
  .del-btn:hover{background:#3a0a0a;border-color:var(--red);color:var(--red)}

  .empty{text-align:center;padding:4rem 2rem;color:var(--ink3)}
  .empty .ei{font-size:3rem;margin-bottom:1rem;opacity:.4}
  .empty p{font-size:.82rem;line-height:1.7}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--orange);color:#fff;padding:.7rem 1.4rem;border-radius:40px;font-size:.78rem;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.05em;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:1000;box-shadow:0 8px 30px rgba(249,115,22,.3);white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--red);color:#fff;box-shadow:0 8px 30px rgba(248,113,113,.3)}

  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  @media(max-width:500px){
    .stats-bar{grid-template-columns:repeat(2,1fr)}
    .stats-bar .stat:nth-child(2){border-right:none}
    .stats-bar .stat:nth-child(3){border-top:1px solid var(--border)}
    .stats-bar .stat:nth-child(4){border-top:1px solid var(--border);border-right:none}
    .activity-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<header>
  <div class="h-eyebrow">Activity Tracker</div>
  <h1>Trail <em>Dog</em></h1>
  <div class="h-sub">Adventures logged · Synced to Google Sheets</div>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Activities</div></div>
  <div class="stat"><div class="stat-val" id="stat-miles">—</div><div class="stat-lbl">Total Miles</div></div>
  <div class="stat"><div class="stat-val" id="stat-longest">—</div><div class="stat-lbl">Longest</div></div>
  <div class="stat"><div class="stat-val" id="stat-fav">—</div><div class="stat-lbl">Top Spot</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log-entry',this)">+ Log Activity</button>
  <button class="tab" onclick="switchTab('log-view',this)">📋 Activity Log</button>
</div>

<!-- LOG ENTRY -->
<div id="panel-log-entry" class="panel active">
  <div class="fw">

    <div class="field">
      <label>Date</label>
      <div class="date-display" id="ddate">📅 —</div>
    </div>

    <div class="field">
      <label>Activity Type</label>
      <div class="activity-grid">
        <button class="act-btn" data-act="hike" onclick="selectAct('hike',this)">
          <span class="act-icon">🥾</span>
          <span class="act-name">Hike</span>
          <span class="act-sub">Trail hiking</span>
        </button>
        <button class="act-btn" data-act="trail-run" onclick="selectAct('trail-run',this)">
          <span class="act-icon">🏃</span>
          <span class="act-name">Trail Run</span>
          <span class="act-sub">Off-road running</span>
        </button>
        <button class="act-btn" data-act="mtb" onclick="selectAct('mtb',this)">
          <span class="act-icon">🚵</span>
          <span class="act-name">MTB</span>
          <span class="act-sub">Mountain biking</span>
        </button>
        <button class="act-btn" data-act="ruck" onclick="selectAct('ruck',this)">
          <span class="act-icon">🎒</span>
          <span class="act-name">Ruck</span>
          <span class="act-sub">Weighted hike</span>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Location</label>
      <div class="loc-list" id="loc-list"></div>
      <div class="add-loc-row">
        <input type="text" id="new-loc-input" placeholder="Add new location…">
        <button onclick="addLocation()">+ Add</button>
      </div>
    </div>

    <div class="field">
      <label>Distance</label>
      <div class="dist-wrap">
        <input type="number" id="distance" min="0" step="0.1" placeholder="0.0" inputmode="decimal">
        <span class="dist-unit">mi</span>
      </div>
    </div>

    <button class="savebtn" id="savebtn" onclick="saveActivity()">
      Log Activity 🐾
    </button>

  </div>
</div>

<!-- LOG VIEW -->
<div id="panel-log-view" class="panel">
  <div class="log-wrap">
    <div class="log-header">
      <div class="log-title">Activity Log</div>
      <div class="log-count" id="log-count">0 activities</div>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn on" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="hike" onclick="setFilter('hike',this)">🥾 Hike</button>
      <button class="filter-btn" data-filter="trail-run" onclick="setFilter('trail-run',this)">🏃 Trail Run</button>
      <button class="filter-btn" data-filter="mtb" onclick="setFilter('mtb',this)">🚵 MTB</button>
      <button class="filter-btn" data-filter="ruck" onclick="setFilter('ruck',this)">🎒 Ruck</button>
    </div>
    <div id="activity-log"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Google Sheets URL ──────────────────────────────────────
// Replace with your own Apps Script URL when deploying
const GS_URL = 'https://script.google.com/macros/s/AKfycbyi9yx8CO1PbVJhT161BkjmxOGPFrGOE6hoKo9mnisoEihJ7BCYVF8gVBJThGIogkm-/exec';

// ── Config ─────────────────────────────────────────────────
const DEFAULT_LOCATIONS = ['Rattlesnake Hill','Burgess Brown','Annie Moore','Horse Meadows Knoll','Delaney'];
const ACT_ICONS = {'hike':'🥾','trail-run':'🏃','mtb':'🚵','ruck':'🎒'};
const ACT_LABELS = {'hike':'Hike','trail-run':'Trail Run','mtb':'MTB','ruck':'Ruck'};

// ── State ──────────────────────────────────────────────────
let selectedAct = null;
let selectedLoc = null;
let currentFilter = 'all';
let locations = JSON.parse(localStorage.getItem('td_locations') || 'null') || [...DEFAULT_LOCATIONS];

// ── Google Sheets ──────────────────────────────────────────
async function gsRead(){
  const res = await fetch(GS_URL+'?action=read', {method:'GET', redirect:'follow'});
  return res.json();
}
async function gsWrite(payload){
  await fetch(GS_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
}
async function gsAdd(entry){ await gsWrite({action:'add', entry}) }
async function gsDelete(id){ await gsWrite({action:'delete', id}) }

// ── Local cache ────────────────────────────────────────────
function lLoad(){ try{ return JSON.parse(localStorage.getItem('td_activities')||'[]') }catch{ return [] } }
function lSave(a){ localStorage.setItem('td_activities', JSON.stringify(a)) }
function saveLocations(){ localStorage.setItem('td_locations', JSON.stringify(locations)) }

// ── Date ───────────────────────────────────────────────────
document.getElementById('ddate').textContent = '📅 ' +
  new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// ── Activity selection ─────────────────────────────────────
function selectAct(act, btn){
  selectedAct = act;
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

// ── Location list ──────────────────────────────────────────
function renderLocations(){
  const list = document.getElementById('loc-list');
  list.innerHTML = locations.map(loc =>
    `<button class="loc-btn${selectedLoc===loc?' on':''}" onclick="selectLoc('${esc(loc)}',this)">${esc(loc)}</button>`
  ).join('');
}

function selectLoc(loc, btn){
  selectedLoc = loc;
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function addLocation(){
  const inp = document.getElementById('new-loc-input');
  const val = inp.value.trim();
  if(!val) return;
  if(locations.includes(val)){ showToast('Location already exists'); return; }
  locations.push(val);
  saveLocations();
  inp.value = '';
  selectedLoc = val;
  renderLocations();
}

// ── Save activity ──────────────────────────────────────────
async function saveActivity(){
  if(!selectedAct){ showToast('Pick an activity type','err'); return; }
  if(!selectedLoc){ showToast('Pick a location','err'); return; }
  const dist = parseFloat(document.getElementById('distance').value);
  if(!dist || dist <= 0){ showToast('Enter a distance','err'); return; }

  const entry = {
    id: Date.now(),
    date: new Date().toISOString(),
    activity: selectedAct,
    location: selectedLoc,
    distance: dist
  };

  const btn = document.getElementById('savebtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';

  try{
    const cache = lLoad(); cache.unshift(entry); lSave(cache);
    await gsAdd(entry);
    resetForm();
    updateStats(lLoad());
    showToast('🐾 Logged! ' + dist.toFixed(1) + ' mi at ' + selectedLoc);
    setTimeout(() => document.querySelectorAll('.tab')[1].click(), 700);
  } catch(err){
    resetForm();
    showToast('Saved locally (Sheets unreachable)', 'err');
    setTimeout(() => document.querySelectorAll('.tab')[1].click(), 700);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Log Activity 🐾';
  }
}

function resetForm(){
  selectedAct = null; selectedLoc = null;
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('distance').value = '';
}

// ── Tabs ───────────────────────────────────────────────────
function switchTab(t, btn){
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  if(t === 'log-view') renderLog();
}

// ── Filter ─────────────────────────────────────────────────
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderLog();
}

// ── Render log ─────────────────────────────────────────────
async function renderLog(){
  const el = document.getElementById('activity-log');

  // Show cached data immediately so screen isn't blank
  const cached = lLoad();
  if(cached.length) renderLogFromData(cached);
  else el.innerHTML = '<div class="empty"><div class="ei">⏳</div><p>Loading from Sheets…</p></div>';

  // Always fetch fresh from Sheets — it's the source of truth
  try{
    const fresh = await gsRead();
    if(!Array.isArray(fresh)) throw new Error('bad response');
    const normalised = fresh.map(a => ({...a, distance: +a.distance}));
    lSave(normalised); // update local cache to match Sheets
    renderLogFromData(normalised);
  } catch(e){
    // Sheets unreachable — stick with cached data
    if(!cached.length){
      el.innerHTML = '<div class="empty"><div class="ei">⚠️</div><p>Could not load data.<br>Check your connection.</p></div>';
    }
    showToast('⚠ Using cached data — Sheets unreachable');
  }
}

function renderLogFromData(arr){
  const el = document.getElementById('activity-log');
  const filtered = currentFilter === 'all' ? arr : arr.filter(a => a.activity === currentFilter);
  // Most recent first
  filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

  // Stats reflect the currently filtered set
  updateStats(filtered);

  document.getElementById('log-count').textContent = filtered.length + ' activit' + (filtered.length===1?'y':'ies');

  if(!filtered.length){
    el.innerHTML = '<div class="empty"><div class="ei">🐾</div><p>No activities yet.<br>Go get outside!</p></div>';
    return;
  }

  el.innerHTML = filtered.map(a => {
    const ds = new Date(a.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
    const icon = ACT_ICONS[a.activity] || '🐾';
    const label = ACT_LABELS[a.activity] || a.activity;
    return `<div class="act-card ${a.activity}">
      <div class="ac-icon">${icon}</div>
      <div class="ac-main">
        <div class="ac-type">${label}</div>
        <div class="ac-loc">📍 ${esc(String(a.location))}</div>
        <div class="ac-date">${ds}</div>
      </div>
      <div class="ac-dist">
        <div class="ac-dist-val">${(+a.distance).toFixed(1)}</div>
        <div class="ac-dist-unit">miles</div>
      </div>
      <button class="del-btn" onclick="deleteActivity(${a.id})">✕</button>
    </div>`;
  }).join('');
}

// ── Stats ──────────────────────────────────────────────────
function updateStats(arr){
  if(!arr.length){
    document.getElementById('stat-total').textContent = '0';
    document.getElementById('stat-miles').textContent = '0';
    document.getElementById('stat-longest').textContent = '0';
    document.getElementById('stat-fav').textContent = '—';
    return;
  }
  const total = arr.length;
  const miles = arr.reduce((s,a) => s + (+a.distance||0), 0);
  const longest = Math.max(...arr.map(a => +a.distance||0));
  // Favourite location
  const locCounts = {};
  arr.forEach(a => { locCounts[a.location] = (locCounts[a.location]||0)+1; });
  const fav = Object.entries(locCounts).sort((a,b)=>b[1]-a[1])[0][0];
  const favShort = fav.split(' ')[0]; // first word only for space

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-miles').textContent = miles.toFixed(1);
  document.getElementById('stat-longest').textContent = longest.toFixed(1)+'mi';
  document.getElementById('stat-fav').textContent = favShort;
}

// ── Delete ─────────────────────────────────────────────────
async function deleteActivity(id){
  if(!confirm('Remove this activity?')) return;
  lSave(lLoad().filter(a => a.id !== id));
  await gsDelete(id);
  showToast('Activity removed');
  renderLog();
}

// ── Helpers ────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type==='err' ? ' err' : '');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3200);
}

// ── Init ───────────────────────────────────────────────────
renderLocations();

// ── Historical data import (runs once on first load) ──────
async function importHistorical() {
  if (localStorage.getItem('td_imported')) return;
  showToast('📥 Importing ' + HISTORICAL_DATA.length + ' historical activities…');
  // Save to local cache immediately
  lSave([...HISTORICAL_DATA]);
  updateStats(HISTORICAL_DATA);
  // Set flag NOW so a closed tab never re-imports
  localStorage.setItem('td_imported', '1');
  // Push to Google Sheets in batches (background, non-blocking)
  const BATCH = 50;
  for (let i = 0; i < HISTORICAL_DATA.length; i += BATCH) {
    const batch = HISTORICAL_DATA.slice(i, i + BATCH);
    await Promise.all(batch.map(e => gsAdd(e)));
  }
  showToast('✅ ' + HISTORICAL_DATA.length + ' historical activities synced to Sheets!');
}

// Load stats on startup — show cache immediately, then sync from Sheets
(async function init(){
  const cached = lLoad();
  if(cached.length) updateStats(cached);
  else updateStats(HISTORICAL_DATA);

  // Run historical import if needed (sets flag before Sheets writes)
  await importHistorical();

  // Always refresh stats from Sheets to keep all devices in sync
  try{
    const fresh = await gsRead();
    if(Array.isArray(fresh) && fresh.length > 0){
      const normalised = fresh.map(a => ({...a, distance: +a.distance}));
      lSave(normalised);
      updateStats(normalised);
    }
  } catch{ /* keep cached stats */ }
})();
</script>
